<div class="min-h-screen flex items-center justify-center bg-slate-50 relative overflow-hidden">

  <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full h-[600px] bg-violet-400/20 rounded-full blur-[100px] -z-10 pointer-events-none"></div>

  <div class="bg-white/80 backdrop-blur-xl p-10 rounded-3xl shadow-2xl border border-white max-w-md w-full animate-fade-in text-center">

    <div class="w-16 h-16 mx-auto bg-gradient-to-tr from-violet-600 to-indigo-600 rounded-2xl shadow-lg flex items-center justify-center mb-6 transform rotate-3 hover:rotate-6 transition-transform">
      <mat-icon class="text-white text-3xl h-8 w-8 leading-8">lock_reset</mat-icon>
    </div>

    <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">Crea tu contraseña</h1>
    <p class="text-slate-500 mt-2 mb-8 font-medium">
      Define una contraseña segura para acceder a Mayoriza.
    </p>

    <form [formGroup]="setPasswordForm" (ngSubmit)="onSubmit()" class="space-y-4">

      <div *ngIf="errorMessage()" class="p-3 bg-red-50 text-red-600 rounded-lg text-sm mb-4 border border-red-100 flex items-start">
        <mat-icon class="mr-2 text-sm mt-0.5">error_outline</mat-icon>
        <span>{{ errorMessage() }}</span>
      </div>

      <div class="flex flex-col text-left">
        <label class="text-sm font-semibold text-slate-700 mb-1">Nueva contraseña</label>
        <input
          type="password"
          formControlName="password"
          autocomplete="new-password"
          class="px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-transparent transition-all"
          placeholder="Mínimo 8 caracteres"
        />
        <span *ngIf="setPasswordForm.get('password')?.touched && setPasswordForm.get('password')?.invalid" class="text-xs text-red-500 mt-1">
          La contraseña debe tener al menos 8 caracteres.
        </span>
      </div>

      <div class="flex flex-col text-left">
        <label class="text-sm font-semibold text-slate-700 mb-1">Confirmar contraseña</label>
        <input
          type="password"
          formControlName="confirmPassword"
          autocomplete="new-password"
          class="px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-transparent transition-all"
          placeholder="Repite la contraseña"
        />
        <span *ngIf="setPasswordForm.get('confirmPassword')?.touched && setPasswordForm.errors?.['passwordsMismatch']" class="text-xs text-red-500 mt-1">
          Las contraseñas no coinciden.
        </span>
      </div>

      <button
        type="submit"
        [disabled]="setPasswordForm.invalid || isSubmitting()"
        class="w-full bg-violet-600 hover:bg-violet-700 text-white font-bold py-3 px-4 rounded-xl shadow-md shadow-violet-500/30 transition-all disabled:bg-slate-300 disabled:shadow-none flex justify-center items-center h-12 mt-4"
      >
        <mat-spinner *ngIf="isSubmitting()" diameter="20" class="mr-2"></mat-spinner>
        <span>{{ isSubmitting() ? 'Guardando…' : 'Guardar contraseña' }}</span>
      </button>

    </form>

  </div>
</div>
